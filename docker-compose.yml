services:
  app:
    build: .
    image: tech-info-collector:latest
    container_name: tech-info-collector
    ports:
      - "4040:4040"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=4040
    volumes:
      - collector_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4040',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  collector_data:
